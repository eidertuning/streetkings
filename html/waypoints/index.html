<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=512, height=1024, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="waypoint" class="waypoint" style="display: none;">
        <div class="wp-icon-wrap">
            <i id="wp-icon" class="fa-solid fa-location-dot"></i>
            <img id="wp-img" src="" alt="" />
        </div>

        <div class="wp-info">
            <div class="wp-countdown" id="wp-countdown"></div>
            <div class="wp-dist" id="wp-dist"></div>
            <div class="wp-divider"></div>
            <div class="wp-label" id="wp-label">WAYPOINT</div>
        </div>

        <div class="wp-arrow"></div>
        <div class="wp-trail"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
