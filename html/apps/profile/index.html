<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StreetKings Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="profile-app">
    <section class="profile-hero">
      <div class="profile-avatar"><span>SK</span></div>
      <div class="profile-title-block">
        <p class="profile-kicker">StreetKings SDK</p>
        <h1 id="profileName">Perfil del piloto</h1>
        <p id="profileStatus">Cargando datos del save activo...</p>
      </div>
    </section>

    <section class="profile-grid" aria-label="Datos del perfil">
      <article class="profile-stat">
        <span>Nivel</span>
        <strong id="profileLevel">--</strong>
      </article>
      <article class="profile-stat">
        <span>XP</span>
        <strong id="profileXp">--</strong>
      </article>
      <article class="profile-stat">
        <span>Efectivo</span>
        <strong id="profileCash">--</strong>
      </article>
    </section>

    <section class="profile-form">
      <label for="aliasInput">Alias visible en tablas</label>
      <div class="profile-input-row">
        <input id="aliasInput" maxlength="32" autocomplete="off" placeholder="Tu alias">
        <button id="saveBtn" type="button">Guardar</button>
      </div>
      <p id="profileMessage" class="profile-message">Esta app se carga como iframe externo y habla con Lua usando fetchNui.</p>
    </section>

    <section class="profile-form profile-form--tablet">
      <div class="profile-form-grid">
        <label for="wallpaperSelect">Fondo de pantalla</label>
        <select id="wallpaperSelect">
          <option value="streetkings">StreetKings</option>
          <option value="midnight">Midnight</option>
          <option value="neon">Neon</option>
          <option value="garage">Garage</option>
        </select>
      </div>
      <div class="profile-toggle-row">
        <label><input id="notifEnabled" type="checkbox"> Notificaciones activas</label>
        <label><input id="notifPreview" type="checkbox"> Mostrar vista previa</label>
      </div>
      <div class="profile-icon-grid">
        <label for="profileIconLabel">Nombre del icono</label>
        <label for="profileIconGlyph">Inicial</label>
        <label for="profileIconColor">Color</label>
        <input id="profileIconLabel" maxlength="32" placeholder="Perfil">
        <input id="profileIconGlyph" maxlength="4" placeholder="P">
        <input id="profileIconColor" maxlength="7" placeholder="#14b8a6">
      </div>
      <button id="saveTabletBtn" type="button">Guardar personalización</button>
    </section>

    <section class="profile-actions">
      <button id="pingBtn" type="button"><span class="profile-action-glyph">OK</span><span>Probar callback</span></button>
      <button id="closeBtn" type="button"><span class="profile-action-glyph">X</span><span>Cerrar</span></button>
    </section>
  </main>

  <script src="../../js/tablet-sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
